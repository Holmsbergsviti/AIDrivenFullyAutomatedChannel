services:
  - type: web
    name: signals-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: MORNING_POST_TIME
        value: "10:00"
      - key: EVENING_POST_TIME
        value: "20:00"
      - key: TIMEZONE
        value: UTC
      - key: USE_DALLE
        value: "false"
      - key: USE_UNSPLASH
        value: "false"
